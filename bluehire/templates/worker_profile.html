{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

```
<div class="card shadow-lg border-0">

    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Worker Profile</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Skills</label>
                    <input 
                        type="text"
                        name="skills"
                        class="form-control"
                        value="{{ profile.skills if profile else '' }}"
                        placeholder="Electrician, Plumber, Driver">
                </div>
                <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text"
                name="phone"
                class="form-control"
                value="{{ profile.phone if profile else '' }}">
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Experience (Years)</label>
                    <input 
                        type="number"
                        name="experience_years"
                        class="form-control"
                        min="0"
                        value="{{ profile.experience_years if profile else 0 }}">
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Preferred Location</label>
                    <input 
                        type="text"
                        name="preferred_location"
                        class="form-control"
                        value="{{ profile.preferred_location if profile else '' }}"
                        placeholder="City / Area">
                </div>

            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    Save Profile
                </button>

                <a href="{{ url_for('worker.dashboard') }}" 
                   class="btn btn-secondary ms-2">
                   Back
                </a>
            </div>

        </form>

    </div>

</div>
```

</div>

{% endblock %}
